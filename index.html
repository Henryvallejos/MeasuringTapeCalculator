<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meausing Tape Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Measuring Tape Calculator</h1>
    <div class="container-items">
        <p id="previous-data-input"></p>
        <div class="container-display">
            <p id="display-data-el">0</p>
        </div>
        <div class="container-flex">
            <div class="num-container">
                <button id="clear-btn" value="clear" onclick="clearData()">Clear</button>
                <button id="seven" class="num-btn"  value="seven" onclick="displaySeven()">7</button>
                <button id="eight" class="num-btn"  value="eight" onclick="displayEight()">8</button>
                <button id="nine" class="num-btn"  value="nine" onclick="displayNine()">9</button>
                <button id="six" class="num-btn"  value="six" onclick="displaySix()">6</button>
                <button id="five" class="num-btn"  value="five" onclick="displayFive()">5</button>
                <button id="four" class="num-btn"  value="four" onclick="displayFour()">4</button>
                <button id="three" class="num-btn"  value="three" onclick="displayThree()">3</button>
                <button id="two" class="num-btn"  value="two" onclick="displayTwo()">2</button>
                <button id="one" class="num-btn"  value="one" onclick="displayOne()">1</button>
                <button id="zero" class="num-btn"  value="zero" onclick="displayZero()">0</button>
            </div>
            <div class="side-container">
                <button id="plus-btn" value="add" onclick="displayAdditionSign()">+</button>
                <button id="minus-btn" value="minus" onclick="displaySubtractionSign()">-</button>
                <button id="equal-btn" value="equal" onclick="calculate()">=</button>
                
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
